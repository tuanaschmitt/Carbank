<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fale Conosco</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #25d366; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 30px 16px; }
    .wrapper { width: 100%; max-width: 600px; }
    .boas-vindas { text-align: center; margin-bottom: 20px; background: #1b5e20; border-radius: 12px; padding: 22px 20px; }
    .boas-vindas p { color: #c8e6c9; font-size: 15px; margin-bottom: 6px; }
    .boas-vindas h2 { color: #fff; font-size: 24px; font-weight: 800; text-transform: uppercase; }
    .boas-vindas span { display: inline-block; margin-top: 8px; background: #fff; color: #1b5e20; font-size: 22px; font-weight: 900; letter-spacing: 0.18em; padding: 4px 20px; border-radius: 6px; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 32px; font-weight: 800; color: #000; background: #fff; display: inline-block; padding: 8px 28px; border-radius: 8px; }
    .header p { margin-top: 10px; color: #fff; font-size: 15px; }
    .card { background: #fff; border-radius: 16px; padding: 32px 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #2e7d32; border-left: 4px solid #2e7d32; padding-left: 10px; margin-bottom: 16px; margin-top: 24px; }
    .section-title:first-child { margin-top: 0; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .gap { margin-top: 14px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 13px; font-weight: 600; color: #111; }
    input, textarea { background: #f4faf4; border: 2px solid #c8e6c9; border-radius: 8px; padding: 11px 13px; color: #111; font-family: inherit; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: #2e7d32; background: #fff; }
    input::placeholder, textarea::placeholder { color: #aaa; }
    textarea { resize: vertical; min-height: 100px; }
    .btn { margin-top: 26px; width: 100%; padding: 15px; background: #25d366; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #128c7e; }
    .status { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; display: none; text-align: center; }
    .status.success { display: block; background: #e8f5e9; border: 2px solid #2e7d32; color: #1b5e20; }
    .status.error { display: block; background: #ffebee; border: 2px solid #c62828; color: #c62828; }
    @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } .card { padding: 22px 16px; } }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="boas-vindas">
    <p>🚗 Seja muito bem-vindo à mais completa</p>
    <h2>Plataforma de Mobilidade</h2>
    <span>CARBANK</span>
  </div>
  <div class="header">
    <h1>📋 Fale Conosco</h1>
    <p>Preencha o formulário e entraremos em contato em breve.</p>
  </div>
  <div class="card">
    <form id="contactForm" novalidate>
      <p class="section-title">Dados da Empresa</p>
      <div class="grid-2">
        <div class="field"><label>Nome da Loja *</label><input type="text" name="nome_loja" placeholder="Ex: Loja Central" required/></div>
        <div class="field"><label>CNPJ *</label><input type="text" name="cnpj" placeholder="00.000.000/0000-00" required/></div>
      </div>
      <div class="gap"><div class="field"><label>Cidade *</label><input type="text" name="cidade" placeholder="Ex: São Paulo" required/></div></div>
      <p class="section-title">Responsável</p>
      <div class="field"><label>Nome *</label><input type="text" name="nome" placeholder="Nome completo" required/></div>
      <div class="gap"><div class="field"><label>Telefone *</label><input type="tel" name="telefone" placeholder="(11) 99999-9999" required/></div></div>
      <p class="section-title">Mensagem</p>
      <div class="field"><label>Mensagem *</label><textarea name="mensagem" placeholder="Descreva sua solicitação..." required></textarea></div>
      <button class="btn" type="submit" id="submitBtn">Enviar pelo WhatsApp 📲</button>
      <div class="status" id="statusMsg"></div>
    </form>
  </div>
</div>
<script>
  const form = document.getElementById("contactForm");
  const btn = document.getElementById("submitBtn");
  const statusMsg = document.getElementById("statusMsg");
  form.addEventListener("submit", function(e) {
    e.preventDefault();
    const required = form.querySelectorAll("[required]");
    let valid = true;
    required.forEach(el => { el.style.borderColor = ""; if (!el.value.trim()) { el.style.borderColor = "#c62828"; valid = false; } });
    if (!valid) { showStatus("⚠️ Preencha todos os campos obrigatórios.", "error"); return; }
    const texto = "🚗 *NOVA SOLICITAÇÃO - CARBANK*\n\n🏪 *Loja:* " + form.nome_loja.value + "\n📄 *CNPJ:* " + form.cnpj.value + "\n📍 *Cidade:* " + form.cidade.value + "\n👤 *Responsável:* " + form.nome.value + "\n📞 *Telefone:* " + form.telefone.value + "\n\n💬 *Mensagem:*\n" + form.mensagem.value;
    window.location.href = "https://wa.me/5551992779921?text=" + encodeURIComponent(texto);
    showStatus("✅ Abrindo WhatsApp...", "success");
    form.reset();
  });
  function showStatus(msg, type) { statusMsg.textContent = msg; statusMsg.className = "status " + type; }
</script>
</body>
</html>
