<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Move Brasil – CarBank | Ficha Cadastral</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --azul:#0A1F44;--azul-m:#102E6A;--prata:#C8D0DC;--ouro:#C9A84C;--ouro-cl:#E8C96A;--branco:#F5F7FA;--cinza:#8A95A3;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--azul);color:var(--branco);min-height:100vh;}
    header{background:linear-gradient(135deg,var(--azul) 0%,var(--azul-m) 100%);border-bottom:3px solid var(--ouro);padding:28px 24px 22px;text-align:center;position:sticky;top:0;z-index:10;}
    .logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px;}
    .logo-icon{width:46px;height:46px;background:var(--ouro);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--azul);}
    h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,5vw,34px);font-weight:700;letter-spacing:2px;color:var(--branco);text-transform:uppercase;line-height:1;}
    h1 span{color:var(--ouro);}
    .subtitle{font-size:12px;color:var(--prata);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
    main{max-width:720px;margin:0 auto;padding:32px 16px 80px;}
    .card-destaque{background:linear-gradient(135deg,rgba(201,168,76,0.15) 0%,rgba(201,168,76,0.05) 100%);border:2px solid var(--ouro);border-radius:14px;padding:24px 20px;margin-bottom:24px;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.25);border-radius:14p
<div class="card-destaque">
<div class="section-title-destaque">🚗 Dados da Operação</div>
<div class="grid col-2">
<div class="field"><label>Nome da Concessionária</label><input class="input-destaque" type="text" id="concessionaria" name="concessionaria" placeholder="Ex: AC Veículos" /></div>
<div class="field"><label>Nome do Vendedor</label><input class="input-destaque" type="text" id="vendedor" name="vendedor" placeholder="Nome do vendedor" /></div>
</div>
<div class="grid col-2" style="margin-top:14px">
<div class="field"><label>Modelo do Veículo</label><input class="input-destaque" type="text" id="modelo_veiculo" name="modelo_veiculo" placeholder="Ex: Gol 2020" /></div>
<div class="field"><label>% de Entrada</label><input class="input-destaque" type="text" id="entrada_pct" name="entrada_pct" placeholder="Ex: 30%" /></div>
</div></div>
<div class="card"><div class="section-title">Dados Pessoais</div>
<div class="grid"><div class="field"><label>CPF</label><input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" /></div>
<div class="field"><label>Nome Completo</label><input type="text" id="nome" name="nome" placeholder="Nome como no documento" /></div></div>
<div class="grid col-3" style="margin-top:14px">
<div class="field"><label>Identidade Nº</label><input type="text" id="rg" name="rg" placeholder="RG" /></div>
<div class="field"><label>Órgão Expedidor</label><input type="text" id="orgao" name="orgao" placeholder="SSP/RS" /></div>
<div class="field"><label>Data de Nascimento</label><input type="date" id="nascimento" name="nascimento" /></div></div>
<div class="grid col-2" style="margin-top:14px">
<div class="field"><label>Nacionalidade</label><input type="text" id="nacionalidade" name="nacionalidade" placeholder="Brasileira" /></div>
<div class="field"><label>Naturalidade</label><input type="text" id="naturalidade" name="naturalidade" placeholder="Cidade/UF" /></div></div>
<div class="grid col-2" style="margin-top:14px">
<div class="field"><label>Sexo</label><div class="radio-group"><label class="radio-item"><input type="radio" name="sexo" value="M" /> Masculino</label><label class="radio-item"><input type="radio" name="sexo" value="F" /> Feminino</label></div></div>
<div class="field"><label>Estado Civil</label><select id="estado_civil" name="estado_civil"><option value="">Selecione</option><option>Solteiro(a)</option><option>Casado(a)</option><option>Divorciado(a)</option><option>Viúvo(a)</option><option>União Estável</option></select></div></div>
<div class="field" style="margin-top:14px"><label>Filiação (Mãe)</label><input type="text" id="mae" name="mae" placeholder="Nome completo da mãe" /></div></div>
<div class="card"><div class="section-title">Endereço Residencial</div>
<div class="grid"><div class="field"><label>Rua / Avenida</label><input type="text" id="end_res" name="end_res" placeholder="Logradouro" /></div>
<div class="field"><label>Número</label><input type="text" id="end_num" name="end_num" placeholder="Nº" /></div></div>
<div class="grid col-3" style="margin-top:14px">
<div class="field"><label>Complemento</label><input type="text" id="complemento" name="complemento" placeholder="Apto..." /></div>
<div class="field"><label>Bairro</label><input type="text" id="bairro_res" name="bairro_res" placeholder="Bairro" /></div>
<div class="field"><label>CEP</label><input type="text" id="cep_res" name="cep_res" placeholder="00000-000" maxlength="9" /></div></div>
<div class="grid col-2" style="margin-top:14px">
<div class="field"><label>Cidade</label><input type="text" id="cidade_res" name="cidade_res" placeholder="Cidade" /></div>
<div class="field"><label>UF</label><input type="text" id="uf_res" name="uf_res" placeholder="RS" maxlength="2" /></div></div>
<div class="grid col-2" style="margin-top:14px">
<div class="field"><label>Telefone</label><input type="tel" id="telefone" name="telefone" placeholder="(51) 99999-9999" /></div>
<div class="field"><label>E-mail</label><input type="email" id="email" name="email" placeholder="seu@email.com" /></div></div></div>
